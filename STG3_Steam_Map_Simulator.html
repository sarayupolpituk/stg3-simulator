<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STG3 Steam Map Simulator — PT Fajar Surya Wisesa 1×55 MW</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono','Courier New',monospace;background:#f8f8f6;color:#222;padding:16px;max-width:940px;margin:0 auto}
.title-bar{text-align:center;margin-bottom:14px}
.title-bar h1{font-size:15px;font-weight:700;margin-bottom:2px}
.title-bar p{font-size:10px;color:#888}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.presets button{padding:6px 11px;font-size:11px;font-family:inherit;border-radius:6px;cursor:pointer;line-height:1.3;text-align:center;transition:all .15s;background:#f0efea;border:1px solid #ccc;color:#666}
.presets button.active{color:#fff}
.chart-wrap{background:#fff;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.cond-legend{display:flex;flex-wrap:wrap;gap:10px 18px;padding:10px 16px;background:#fafaf8;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;margin-bottom:0}
.cond-item{display:flex;align-items:center;gap:6px;font-size:11px;line-height:1.3}
.cond-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.15)}
.cond-label{font-weight:600}
.cond-detail{color:#888;font-size:10px}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.ctrl-box{border-radius:8px;padding:10px 14px}
.ctrl-box label{font-size:11px;font-weight:600;display:block;margin-bottom:4px}
.ctrl-box input[type=range]{width:100%;margin:4px 0}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.ctrl-row input[type=number]{width:72px;padding:4px 6px;font-size:14px;font-weight:600;font-family:inherit;border-radius:4px;text-align:center}
.ctrl-row span{font-size:11px}
.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-top:12px}
.res-card{background:#f0efea;border-radius:8px;padding:8px 12px}
.res-card .lbl{font-size:10px;color:#888;margin-bottom:2px}
.res-card .val{font-size:20px;font-weight:700}
.res-card .val span{font-size:12px;font-weight:500}
.res-card .sub{font-size:9px;color:#aaa;margin-top:1px}
.footer{font-size:9px;color:#aaa;margin-top:8px;line-height:1.6}
</style>
</head>
<body>

<div class="title-bar">
  <h1>STG3 Extraction Condensing Turbine — Steam Consumption Diagram</h1>
  <p>PT Fajar Surya Wisesa 1×55 MW | SPERI Design | Inlet: 9.8 MPa / 540°C | Extraction: 1.27 MPa / 210°C</p>
</div>

<div class="presets" id="presets"></div>
<div class="chart-wrap"><svg id="chart" viewBox="0 0 880 520" style="width:100%;display:block;cursor:crosshair"></svg></div>
<div class="cond-legend" id="condLegend"></div>

<div class="controls">
  <div class="ctrl-box" style="background:#fdf2f2;border:1px solid #e6b0aa">
    <label style="color:#922b21">Throttle steam inlet</label>
    <input type="range" id="throttleSlider" min="80" max="220" step="1" value="220" style="accent-color:#c0392b">
    <div class="ctrl-row">
      <input type="number" id="throttleNum" min="80" max="220" step="1" value="220" style="border:1px solid #e6b0aa;color:#922b21">
      <span style="color:#922b21">t/h &nbsp; 9.8 MPa, 540°C</span>
    </div>
  </div>
  <div class="ctrl-box" style="background:#fef9e7;border:1px solid #f0d27a">
    <label style="color:#7d6608" id="extLabel">Extraction steam (max 105 t/h)</label>
    <input type="range" id="extSlider" min="0" max="105" step="1" value="0" style="accent-color:#e67e22">
    <div class="ctrl-row">
      <input type="number" id="extNum" min="0" max="105" step="1" value="0" style="border:1px solid #f0d27a;color:#7d6608">
      <span style="color:#7d6608">t/h &nbsp; 1.27 MPa, 210°C</span>
    </div>
  </div>
</div>

<div class="results" id="results"></div>
<div class="footer" id="footer"></div>

<script>
const K_HP=71.67, K_LP=178.33;
const TH_MAX=220, TH_MIN=80, P_MAX=55, LP_MIN=15, AUX=7130;
const CONDS=[
  {id:1,label:"C1",th:220,ext:0,gMW:55.0,nMW:47.87,so:"0",col:"#c0392b",desc:"100% THA — no extraction, full condensing"},
  {id:2,label:"C2",th:220,ext:42.18,gMW:47.08,nMW:39.9,so:"42.18",col:"#d35400",desc:"42.18 t/h extraction"},
  {id:3,label:"C3",th:220,ext:55.4,gMW:44.75,nMW:37.95,so:"55.4",col:"#27ae60",desc:"55.4 t/h extraction"},
  {id:4,label:"C4",th:220,ext:83.2,gMW:39.55,nMW:32.75,so:"83.2",col:"#2980b9",desc:"83.2 t/h extraction"},
  {id:5,label:"C5",th:220,ext:105,gMW:35.3,nMW:28.57,so:"105",col:"#8e44ad",desc:"105 t/h extraction (max)"},
];

let throttle=220, extraction=0;
const svg=document.getElementById("chart");

function calcGross(th,ext){return Math.min(P_MAX,(th*K_HP+Math.max(th-ext,LP_MIN)*K_LP)/1000)}
function maxExt(th){return Math.min(Math.max(0,th-LP_MIN),105)}

const M={top:38,right:40,bottom:58,left:70},W=880,H=520;
const pw=W-M.left-M.right, ph=H-M.top-M.bottom;
const xMin=0,xMax=60,yMin=60,yMax=240;
function px(mw){return M.left+(mw-xMin)/(xMax-xMin)*pw}
function py(th){return M.top+(1-(th-yMin)/(yMax-yMin))*ph}

function buildStatic(){
  let s='';
  s+=`<text x="${W/2}" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#222" font-family="inherit">STG3 extraction condensing turbine — steam consumption diagram</text>`;
  s+=`<text x="${W/2}" y="33" text-anchor="middle" font-size="9" fill="#999" font-family="inherit">Max throttle: 220 t/h | Max power: 55 MW | Min LP exhaust: ${LP_MIN} t/h</text>`;

  const xT=[0,5,10,15,20,25,30,35,40,45,50,55,60];
  const yT=[60,80,100,120,140,160,180,200,220,240];
  xT.forEach(v=>{s+=`<line x1="${px(v)}" y1="${py(yMax)}" x2="${px(v)}" y2="${py(yMin)}" stroke="#e8e8e4" stroke-width="0.4"/>`});
  yT.forEach(v=>{s+=`<line x1="${px(xMin)}" y1="${py(v)}" x2="${px(xMax)}" y2="${py(v)}" stroke="#e8e8e4" stroke-width="0.4"/>`});
  xT.filter(v=>v%10===0||v===5||v===55).forEach(v=>{s+=`<text x="${px(v)}" y="${H-26}" text-anchor="middle" font-size="10" fill="#888" font-family="inherit">${v}</text>`});
  yT.forEach(v=>{s+=`<text x="${M.left-8}" y="${py(v)+4}" text-anchor="end" font-size="10" fill="#888" font-family="inherit">${v}</text>`});
  s+=`<text x="${W/2}" y="${H-6}" text-anchor="middle" font-size="12" font-weight="500" fill="#222" font-family="inherit">Gross power output (MW)</text>`;
  s+=`<text x="16" y="${H/2}" text-anchor="middle" font-size="12" font-weight="500" fill="#222" font-family="inherit" transform="rotate(-90,16,${H/2})">Throttle steam flow (t/h)</text>`;

  // Envelope
  let p0=[],lp0=[];
  for(let th=TH_MIN;th<=TH_MAX;th+=2){let g=calcGross(th,0);if(g<=P_MAX)p0.push({x:g,y:th})}
  for(let th=TH_MIN;th<=TH_MAX;th+=2){lp0.push({x:calcGross(th,maxExt(th)),y:th})}
  const tp=pts=>pts.map((p,i)=>`${i?'L':'M'}${px(p.x).toFixed(1)},${py(p.y).toFixed(1)}`).join(' ');
  let fillD=tp(lp0)+` L${px(Math.min(calcGross(TH_MAX,0),P_MAX)).toFixed(1)},${py(TH_MAX).toFixed(1)}`+p0.slice().reverse().map(p=>` L${px(p.x).toFixed(1)},${py(p.y).toFixed(1)}`).join('')+' Z';
  s+=`<path d="${fillD}" fill="rgba(41,128,185,0.05)" stroke="none"/>`;

  // Extraction lines
  for(let ext=0;ext<=105;ext+=15){
    let pts=[];
    for(let th=Math.max(TH_MIN,ext+LP_MIN);th<=TH_MAX;th+=2){let g=calcGross(th,ext);if(g<=P_MAX)pts.push({x:g,y:th})}
    if(pts.length>1){
      const col=ext===0?"#2980b9":"#ccc";
      const sw=ext===0?1.8:0.7;
      const da=ext===0?"none":"4,3";
      s+=`<path d="${tp(pts)}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${da}"/>`;
      if(ext>0&&pts.length>0) s+=`<text x="${px(pts[0].x)-2}" y="${py(pts[0].y)+12}" font-size="8" fill="#bbb" font-family="inherit" text-anchor="end">${ext}</text>`;
    }
  }

  // P=0 label
  if(p0.length>4){let i=Math.floor(p0.length*0.65);s+=`<text x="${px(p0[i].x)+6}" y="${py(p0[i].y)-5}" font-size="9" font-weight="500" fill="#2980b9" font-family="inherit">P=0 (no extraction)</text>`}

  // HP=1
  s+=`<line x1="${px(calcGross(220,maxExt(220)))}" y1="${py(220)}" x2="${px(P_MAX)}" y2="${py(220)}" stroke="#c0392b" stroke-width="2.5"/>`;
  s+=`<text x="${px(42)}" y="${py(222)-5}" text-anchor="middle" font-size="10" font-weight="600" fill="#c0392b" font-family="inherit">HP=1  max throttle 220 t/h</text>`;

  // LP=0
  s+=`<path d="${tp(lp0)}" fill="none" stroke="#e67e22" stroke-width="2.5"/>`;
  if(lp0.length>12){
    let i=8,p=lp0[i],p2=lp0[i+4]||p;
    let ang=Math.atan2(py(p2.y)-py(p.y),px(p2.x)-px(p.x))*180/Math.PI;
    s+=`<text x="${px(p.x)}" y="${py(p.y)-8}" font-size="9" font-weight="500" fill="#e67e22" font-family="inherit" transform="rotate(${ang.toFixed(1)},${px(p.x)},${py(p.y)-8})">LP=0  min exhaust ${LP_MIN} t/h</text>`;
  }

  // S=max
  s+=`<line x1="${px(P_MAX)}" y1="${py(TH_MAX)}" x2="${px(P_MAX)}" y2="${py(yMin)}" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6,3"/>`;
  s+=`<text x="${px(P_MAX)+3}" y="${py(yMax)+14}" font-size="9" font-weight="500" fill="#c0392b" font-family="inherit">S=max 55 MW</text>`;

  // S=min
  s+=`<line x1="${px(calcGross(TH_MIN,maxExt(TH_MIN)))}" y1="${py(TH_MIN)}" x2="${px(Math.min(calcGross(TH_MIN,0),P_MAX))}" y2="${py(TH_MIN)}" stroke="#7f8c8d" stroke-width="1.2" stroke-dasharray="5,3"/>`;
  s+=`<text x="${px(calcGross(TH_MIN,15))}" y="${py(TH_MIN)+14}" text-anchor="middle" font-size="9" fill="#7f8c8d" font-family="inherit">S=min  throttle ${TH_MIN} t/h</text>`;

  // Extraction label
  s+=`<text x="${W-M.right-2}" y="${py(yMax)+14}" text-anchor="end" font-size="8" fill="#bbb" font-family="inherit" font-style="italic">extraction t/h</text>`;

  // Condition points — dots only, with small label letter inside
  CONDS.forEach(c=>{
    const cx=px(c.gMW),cy=py(c.th);
    s+=`<circle cx="${cx}" cy="${cy}" r="7" fill="${c.col}" stroke="#fff" stroke-width="2"/>`;
    s+=`<text x="${cx}" y="${cy+3.5}" text-anchor="middle" font-size="7" font-weight="700" fill="#fff" font-family="inherit">${c.id}</text>`;
  });

  return s;
}

const staticSVG=buildStatic();

// Build condition legend below chart
const legendEl=document.getElementById("condLegend");
CONDS.forEach(c=>{
  const item=document.createElement("div");
  item.className="cond-item";
  item.innerHTML=`<div class="cond-dot" style="background:${c.col}"></div>
    <div><span class="cond-label" style="color:${c.col}">${c.label}</span>
    <span class="cond-detail">&nbsp;${c.gMW} MW gross&nbsp;|&nbsp;${c.nMW} MW net&nbsp;|&nbsp;Ext: ${c.so} t/h&nbsp;|&nbsp;${c.desc}</span></div>`;
  legendEl.appendChild(item);
});

function render(){
  const me=maxExt(throttle);
  const ce=Math.min(extraction,me);
  const gMW=calcGross(throttle,ce);
  const nMW=gMW-AUX/1000;
  const cond=throttle-ce;
  const ratio=throttle>0?(ce/throttle*100):0;

  const cpx=px(gMW),cpy=py(throttle);
  const lblRight=cpx+160<W;
  const lx=lblRight?cpx+14:cpx-155;

  let dyn='';
  dyn+=`<line x1="${cpx}" y1="${py(yMax)}" x2="${cpx}" y2="${py(yMin)}" stroke="#c0392b" stroke-width="0.4" stroke-dasharray="3,3" opacity="0.4"/>`;
  dyn+=`<line x1="${px(xMin)}" y1="${cpy}" x2="${px(xMax)}" y2="${cpy}" stroke="#c0392b" stroke-width="0.4" stroke-dasharray="3,3" opacity="0.4"/>`;
  dyn+=`<circle cx="${cpx}" cy="${cpy}" r="10" fill="none" stroke="#c0392b" stroke-width="2"/>`;
  dyn+=`<circle cx="${cpx}" cy="${cpy}" r="3" fill="#c0392b"/>`;

  dyn+=`<rect x="${lx}" y="${cpy-34}" width="148" height="50" rx="4" fill="#fff" stroke="#c0392b" stroke-width="1" opacity="0.95"/>`;
  dyn+=`<text x="${lx+8}" y="${cpy-18}" font-size="12" font-weight="700" fill="#c0392b" font-family="inherit">${gMW.toFixed(2)} MW gross</text>`;
  dyn+=`<text x="${lx+8}" y="${cpy-4}" font-size="9" fill="#888" font-family="inherit">Ext: ${ce.toFixed(1)} t/h</text>`;
  dyn+=`<text x="${lx+8}" y="${cpy+10}" font-size="9" fill="#888" font-family="inherit">Cond: ${cond.toFixed(1)} t/h</text>`;

  svg.innerHTML=staticSVG+dyn;

  document.getElementById("extSlider").max=me;
  document.getElementById("extNum").max=me;
  document.getElementById("extLabel").textContent=`Extraction steam (max ${me} t/h)`;

  const cards=[
    {l:"Gross power",v:gMW.toFixed(2),u:"MW",c:"#c0392b"},
    {l:"Net power",v:nMW.toFixed(2),u:"MW",c:"#27ae60"},
    {l:"Extraction steam",v:ce.toFixed(1),u:"t/h",s:`${ratio.toFixed(1)}% of throttle`,c:"#e67e22"},
    {l:"To condenser",v:cond.toFixed(1),u:"t/h",s:`${(100-ratio).toFixed(1)}% of throttle`,c:"#2980b9"},
    {l:"Throttle steam",v:String(throttle),u:"t/h",s:"9.8 MPa / 540°C",c:"#7f8c8d"},
  ];
  document.getElementById("results").innerHTML=cards.map(c=>`
    <div class="res-card" style="border-left:3px solid ${c.c}">
      <div class="lbl">${c.l}</div>
      <div class="val" style="color:${c.c}">${c.v}<span> ${c.u}</span></div>
      ${c.s?`<div class="sub">${c.s}</div>`:''}
    </div>`).join('');

  document.getElementById("footer").innerHTML=
    `Model: P<sub>gross</sub> = Q<sub>throttle</sub> × ${K_HP.toFixed(1)} + Q<sub>condenser</sub> × ${K_LP.toFixed(1)} kW/(t/h) &nbsp;|&nbsp; Min LP exhaust: ${LP_MIN} t/h &nbsp;|&nbsp; Aux: ${(AUX/1000).toFixed(1)} MW &nbsp;|&nbsp; Drag on chart to explore`;

  document.querySelectorAll('.presets button').forEach((btn,i)=>{
    const c=CONDS[i];
    const active=Math.abs(extraction-c.ext)<0.5&&throttle===c.th;
    btn.style.background=active?c.col:'#f0efea';
    btn.style.color=active?'#fff':'#666';
    btn.style.borderColor=c.col;
  });
}

// Presets
const presetsEl=document.getElementById("presets");
CONDS.forEach(c=>{
  const btn=document.createElement("button");
  btn.innerHTML=`<b>${c.label}</b> ${c.gMW} MW | ${c.so} t/h ext`;
  btn.style.borderColor=c.col;
  btn.onclick=()=>{
    throttle=c.th;extraction=c.ext;
    document.getElementById("throttleSlider").value=throttle;
    document.getElementById("throttleNum").value=throttle;
    document.getElementById("extSlider").value=extraction;
    document.getElementById("extNum").value=Math.round(extraction);
    render();
  };
  presetsEl.appendChild(btn);
});

function syncThrottle(v){
  throttle=Math.max(TH_MIN,Math.min(TH_MAX,Math.round(v)));
  if(extraction>maxExt(throttle)){extraction=maxExt(throttle);document.getElementById("extSlider").value=extraction;document.getElementById("extNum").value=Math.round(extraction)}
  document.getElementById("throttleSlider").value=throttle;
  document.getElementById("throttleNum").value=throttle;
  render();
}
function syncExtraction(v){
  extraction=Math.max(0,Math.min(maxExt(throttle),Math.round(v)));
  document.getElementById("extSlider").value=extraction;
  document.getElementById("extNum").value=Math.round(extraction);
  render();
}
document.getElementById("throttleSlider").oninput=e=>syncThrottle(e.target.value);
document.getElementById("throttleNum").onchange=e=>syncThrottle(e.target.value);
document.getElementById("extSlider").oninput=e=>syncExtraction(e.target.value);
document.getElementById("extNum").onchange=e=>syncExtraction(e.target.value);

let dragging=false;
svg.onmousedown=()=>{dragging=true};
svg.onmouseup=()=>{dragging=false};
svg.onmouseleave=()=>{dragging=false};
svg.onmousemove=e=>{
  if(!dragging)return;
  const rect=svg.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  const mw=xMin+(mx-M.left)/pw*(xMax-xMin);
  const th=yMax-(my-M.top)/ph*(yMax-yMin);
  if(mw>=xMin&&mw<=xMax&&th>=yMin&&th<=yMax){
    const clTh=Math.max(TH_MIN,Math.min(TH_MAX,Math.round(th)));
    const neededExt=Math.max(0,clTh-(mw*1000-clTh*K_HP)/K_LP);
    throttle=clTh;
    extraction=Math.max(0,Math.min(maxExt(clTh),Math.round(neededExt)));
    document.getElementById("throttleSlider").value=throttle;
    document.getElementById("throttleNum").value=throttle;
    document.getElementById("extSlider").value=extraction;
    document.getElementById("extNum").value=Math.round(extraction);
    render();
  }
};
svg.ontouchstart=e=>{dragging=true;e.preventDefault()};
svg.ontouchend=()=>{dragging=false};
svg.ontouchmove=e=>{
  if(!dragging)return;e.preventDefault();
  const touch=e.touches[0];
  const rect=svg.getBoundingClientRect();
  const mx=(touch.clientX-rect.left)*(W/rect.width);
  const my=(touch.clientY-rect.top)*(H/rect.height);
  const mw=xMin+(mx-M.left)/pw*(xMax-xMin);
  const th=yMax-(my-M.top)/ph*(yMax-yMin);
  if(mw>=xMin&&mw<=xMax&&th>=yMin&&th<=yMax){
    const clTh=Math.max(TH_MIN,Math.min(TH_MAX,Math.round(th)));
    const neededExt=Math.max(0,clTh-(mw*1000-clTh*K_HP)/K_LP);
    throttle=clTh;
    extraction=Math.max(0,Math.min(maxExt(clTh),Math.round(neededExt)));
    document.getElementById("throttleSlider").value=throttle;
    document.getElementById("throttleNum").value=throttle;
    document.getElementById("extSlider").value=extraction;
    document.getElementById("extNum").value=Math.round(extraction);
    render();
  }
};

render();
</script>
</body>
</html>
